name: sqlc generated code

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sqlc-check:
    name: Check sqlc generated code
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check generated sqlc output
        run: make sqlc-check
