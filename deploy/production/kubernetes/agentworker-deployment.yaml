apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentworker
  labels:
    app.kubernetes.io/name: agentapi
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agentapi
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentapi
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: agentworker
          image: ghcr.io/yige666s/claude-codex/agentapi:REPLACE_WITH_COMMIT_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: agentapi-prod-config
            - secretRef:
                name: agentapi-prod-secrets
          env:
            - name: AGENT_API_JOB_WORKER_ENABLED
              value: "true"
            - name: AGENT_API_MESSAGE_ATTACHMENT_WORKER_ENABLED
              value: "true"
            - name: AGENT_API_MESSAGE_ARCHIVE_WORKER_ENABLED
              value: "true"
            - name: AGENT_API_MESSAGE_EVENTS_KAFKA_CONSUMER_ENABLED
              value: "false"
          args:
            - -addr
            - :8081
            - -store-backend
            - sql
            - -sql-driver
            - pgx
            - -sql-dialect
            - postgres
            - -data-dir
            - /var/lib/agentapi
            - -workspace
            - /workspace
            - -user-workspace-root
            - /var/lib/agentapi/workspaces
            - -enable-user-system
            - -auth-mode
            - jwt
            - -artifact-store
            - s3
            - "-allow-dangerous-tools=false"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2"
              memory: "3Gi"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agentworker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentapi
      app.kubernetes.io/component: worker

