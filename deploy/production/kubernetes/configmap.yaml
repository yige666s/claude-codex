apiVersion: v1
kind: ConfigMap
metadata:
  name: agentapi-prod-config
data:
  AGENT_API_ENABLE_USER_SYSTEM: "true"
  AGENT_API_AUTH_MODE: "jwt"
  AGENT_API_SQL_DRIVER: "pgx"
  AGENT_API_SQL_DIALECT: "postgres"
  AGENT_API_SQL_MAX_OPEN_CONNS: "30"
  AGENT_API_SQL_MAX_IDLE_CONNS: "10"
  AGENT_API_SQL_CONN_MAX_LIFETIME: "30m"
  AGENT_API_ARTIFACT_STORE: "s3"
  AGENT_API_ARTIFACT_S3_SSL: "true"
  AGENT_API_RATE_LIMIT_BACKEND: "none"
  AGENT_API_REDIS_FAIL_OPEN: "false"
  AGENT_API_MESSAGE_CONTEXT_CACHE_BACKEND: "redis"
  AGENT_API_MESSAGE_CONTEXT_CACHE_TTL: "24h"
  AGENT_API_SESSION_LIST_CACHE_BACKEND: "redis"
  AGENT_API_SESSION_LIST_CACHE_TTL: "10m"
  AGENT_API_MESSAGE_SEQUENCE_BACKEND: "redis"
  AGENT_API_JOB_QUEUE_STREAM: "agentapi:jobs"
  AGENT_API_JOB_QUEUE_CONSUMER_GROUP: "agentapi-job-workers"
  AGENT_API_JOB_QUEUE_BLOCK_TIMEOUT: "2s"
  AGENT_API_JOB_QUEUE_CLAIM_IDLE: "1m"
  AGENT_API_JOB_QUEUE_LOCK_TTL: "2m"
  AGENT_API_CHAT_EVENT_STREAM_ENABLED: "true"
  AGENT_API_CHAT_EVENT_STREAM_PREFIX: "agentapi:chat-events"
  AGENT_API_CHAT_EVENT_STREAM_TTL: "24h"
  AGENT_API_CHAT_EVENT_STREAM_MAX_LEN: "10000"
  AGENT_API_CHAT_EVENT_STREAM_BLOCK: "10s"
  AGENT_API_JOB_EVENT_FANOUT_ENABLED: "true"
  AGENT_API_JOB_EVENT_FANOUT_CHANNEL: "agentapi:job-events"
  AGENT_API_DEEP_RESEARCH_ORCHESTRATOR_WORKER_ENABLED: "true"
  AGENT_API_DEEP_RESEARCH_WORKER_BACKEND: "harness_agent"
  AGENT_API_DEEP_RESEARCH_MAX_WORKERS: "8"
  AGENT_API_DEEP_RESEARCH_MAX_CONCURRENCY: "3"
  AGENT_API_DEEP_RESEARCH_WORKER_TIMEOUT: "5m"
  AGENT_API_DEEP_RESEARCH_TOTAL_TIMEOUT: "20m"
  AGENT_API_DEEP_RESEARCH_MAX_RETRIES: "2"
  AGENT_API_DEEP_RESEARCH_FALLBACK_LEGACY: "true"
  AGENT_API_DEEP_RESEARCH_REQUIRE_SOURCES: "true"
  AGENT_API_DEEP_RESEARCH_MIN_SUCCESSFUL_WORKERS: "1"
  AGENT_API_LLM_PROVIDER: "nvidia"
  AGENT_API_MODEL: "nvidia/nemotron-3-ultra-550b-a55b"
  AGENT_API_LLM_MODEL_ROUTES: "default=nvidia/nemotron-3-ultra-550b-a55b,chat=deepseek-chat,chat:normal=deepseek-chat,chat:search=deepseek-chat,chat:complex=deepseek-reasoner,skill=nvidia/nemotron-3-ultra-550b-a55b,skill:memory-recall-trigger=deepseek-chat,judge=nvidia/nemotron-3-ultra-550b-a55b"
  AGENT_API_EVAL_JUDGE_ENABLED: "false"
  AGENT_API_EVAL_JUDGE_MODEL: ""
  AGENT_API_EVAL_JUDGE_PROMPT_VERSION: "ragas-json-v1"
  AGENT_API_LIVE_ENABLED: "true"
  AGENT_API_LIVE_PROVIDER: "xai"
  AGENT_API_LIVE_MODEL: "grok-voice-latest"
  AGENT_API_LIVE_XAI_BASE_URL: "wss://api.x.ai/v1/realtime"
  AGENT_API_LIVE_VERTEX_LOCATION: "us-central1"
  AGENT_API_LIVE_INPUT_AUDIO_MIME_TYPE: "audio/pcm;rate=16000"
  AGENT_API_LIVE_OUTPUT_AUDIO_MIME_TYPE: "audio/pcm;rate=16000"
  AGENT_API_LIVE_VOICE_NAME: "ara"
  AGENT_API_LIVE_LANGUAGE_CODE: "zh"
  AGENT_API_LIVE_INPUT_TRANSCRIPTION_ENABLED: "true"
  AGENT_API_LIVE_OUTPUT_TRANSCRIPTION_ENABLED: "true"
  AGENT_API_LIVE_VAD_THRESHOLD: "0.75"
  AGENT_API_LIVE_VAD_PREFIX_PADDING: "333ms"
  AGENT_API_LIVE_VAD_SILENCE_DURATION: "1000ms"
  AGENT_API_LIVE_SESSION_TIMEOUT: "10m"
  SHORTAPI_API_BASE: "https://api.shortapi.ai/api/v1"
  SHORTAPI_IMAGE_MODEL: "google/nano-banana-2/text-to-image"
  SHORTAPI_IMAGE_ASPECT_RATIO: "1:1"
  SHORTAPI_IMAGE_RESOLUTION: "1K"
  SHORTAPI_IMAGE_NUM_IMAGES: "1"
  SHORTAPI_IMAGE_TIMEOUT: "5m"
  SHORTAPI_IMAGE_POLL_INTERVAL: "2s"
  AGENT_API_SKILL_DIRS: "/workspace/.claude/skills"
  AGENT_API_SKILL_SHELL_RUNNER: "docker"
  AGENT_API_SKILL_SANDBOX_NETWORK: "none"
  AGENT_API_ALLOW_CUSTOM_WORKING_DIR: "false"
  AGENT_API_RETENTION_DAYS: "30"
  AGENT_API_SHUTDOWN_TIMEOUT: "30s"
  AGENT_API_OPERATION_RATE_LIMITS: ""
  GMAIL_MCP_SERVER_URL: "https://gmail.example.com/mcp"
  GOOGLE_DRIVE_MCP_SERVER_URL: "https://drive.example.com/mcp"
  GOOGLE_MCP_SERVER_URL: "https://google.example.com/mcp"
  LINEAR_MCP_SERVER_URL: "https://linear.example.com/mcp"
  NOTION_MCP_SERVER_URL: "https://notion.example.com/mcp"
  SLACK_MCP_SERVER_URL: "https://mcp.slack.com/mcp"
  AGENT_API_WEBFETCH_BROWSERLESS_BASE_URL: "https://production-sfo.browserless.io"
  AGENT_API_WEBFETCH_BROWSERLESS_TIMEOUT: "30s"
  # Same-origin deployments can leave CORS empty. Split-origin deployments must
  # set this to the exact frontend origin.
  AGENT_API_CORS_ALLOWED_ORIGINS: "https://app.example.com"
  AGENT_API_CORS_ALLOW_CREDENTIALS: "true"
  AGENT_API_JWT_ISSUER: "https://api.example.com"
  AGENT_API_JWT_AUDIENCE: "agentapi-web"
  VERTEX_LOCATION: "us-central1"
  VERTEX_PROJECT_ID: "example-gcp-project"
  GOOGLE_CLOUD_PROJECT: "example-gcp-project"
