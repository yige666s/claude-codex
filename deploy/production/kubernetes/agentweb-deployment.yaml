apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentweb
  labels:
    app.kubernetes.io/name: agentweb
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agentweb
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentweb
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: agentweb
          image: ghcr.io/yige666s/claude-codex/agentweb:REPLACE_WITH_COMMIT_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: agentweb
  labels:
    app.kubernetes.io/name: agentweb
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentweb
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http

