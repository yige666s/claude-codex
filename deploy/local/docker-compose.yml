      AGENT_API_MESSAGE_SEARCH_EMBEDDING_INDEX_TASK_TYPE: ${AGENT_API_MESSAGE_SEARCH_EMBEDDING_INDEX_TASK_TYPE:-RETRIEVAL_DOCUMENT}
      AGENT_API_MESSAGE_SEARCH_EMBEDDING_AUTO_TRUNCATE: ${AGENT_API_MESSAGE_SEARCH_EMBEDDING_AUTO_TRUNCATE:-true}
      AGENT_API_MESSAGE_SEARCH_RRF_K: ${AGENT_API_MESSAGE_SEARCH_RRF_K:-60}
      AGENT_API_LOCAL_ARTIFACT_STAGING_RETENTION: ${AGENT_API_LOCAL_ARTIFACT_STAGING_RETENTION:-24h}
      AGENT_API_RATE_LIMIT_BACKEND: ${AGENT_API_RATE_LIMIT_BACKEND:-redis}
      AGENT_API_REDIS_URL: redis://redis:6379/0?prefix=agentapi
