services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AGENT_API_POSTGRES_DB:-agentapi}
      POSTGRES_USER: ${AGENT_API_POSTGRES_USER:-agentapi}
      POSTGRES_PASSWORD: ${AGENT_API_POSTGRES_PASSWORD:-agentapi}
    ports:
      - "${AGENT_API_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${AGENT_API_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:v24.2.11
    profiles: ["kafka"]
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "${AGENT_API_KAFKA_PORT:-19092}:19092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AGENT_API_ARTIFACT_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AGENT_API_ARTIFACT_S3_SECRET_KEY:-minioadmin}
    ports:
      - "${AGENT_API_MINIO_PORT:-9000}:9000"
      - "${AGENT_API_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    build:
      context: ../..
      dockerfile: deploy/local/elasticsearch-ik.Dockerfile
      args:
        ELASTICSEARCH_VERSION: ${AGENT_API_ELASTICSEARCH_VERSION:-8.15.3}
        IK_PLUGIN_URL: ${AGENT_API_ELASTICSEARCH_IK_PLUGIN_URL:-}
    image: claude-codex-elasticsearch-ik:local
    profiles: ["search"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${AGENT_API_ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  qdrant:
    image: qdrant/qdrant:v1.12.5
    profiles: ["search"]
    ports:
      - "${AGENT_API_QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 30

  agentapi:
    build:
      context: ../..
      dockerfile: Dockerfile.agentapi
    image: claude-codex-agentapi:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AGENT_API_SQL_DSN: postgres://${AGENT_API_POSTGRES_USER:-agentapi}:${AGENT_API_POSTGRES_PASSWORD:-agentapi}@postgres:5432/${AGENT_API_POSTGRES_DB:-agentapi}?sslmode=disable
      AGENT_API_JWT_SECRET: ${AGENT_API_JWT_SECRET:-local-dev-jwt-secret-change-me}
      AGENT_API_ADMIN_TOKEN: ${AGENT_API_ADMIN_TOKEN:-11b270acdc30d0785d791f42aa8a44be87cbbdf6186f3fc4b02e7836d86f38f9}
      AGENT_API_EVAL_DAILY_ENABLED: ${AGENT_API_EVAL_DAILY_ENABLED:-true}
      AGENT_API_EVAL_DAILY_HOUR: ${AGENT_API_EVAL_DAILY_HOUR:-5}
      AGENT_API_EVAL_DAILY_MINUTE: ${AGENT_API_EVAL_DAILY_MINUTE:-0}
      AGENT_API_EVAL_DAILY_USER_IDS: ${AGENT_API_EVAL_DAILY_USER_IDS:-}
      AGENT_API_EVAL_DAILY_BATCH_LIMIT: ${AGENT_API_EVAL_DAILY_BATCH_LIMIT:-200}
      AGENT_API_EVAL_DAILY_TIMEOUT: ${AGENT_API_EVAL_DAILY_TIMEOUT:-10m}
      AGENT_API_TAVILY_API_KEY: ${AGENT_API_TAVILY_API_KEY:-}
      AGENT_API_TAVILY_SEARCH_ENDPOINT: ${AGENT_API_TAVILY_SEARCH_ENDPOINT:-https://api.tavily.com/search}
      AGENT_API_WEBFETCH_CLOUDFLARE_ACCOUNT_ID: ${AGENT_API_WEBFETCH_CLOUDFLARE_ACCOUNT_ID:-}
      AGENT_API_WEBFETCH_CLOUDFLARE_API_TOKEN: ${AGENT_API_WEBFETCH_CLOUDFLARE_API_TOKEN:-}
      AGENT_API_WEBFETCH_CLOUDFLARE_BASE_URL: ${AGENT_API_WEBFETCH_CLOUDFLARE_BASE_URL:-https://api.cloudflare.com/client/v4}
      AGENT_API_WEBFETCH_CLOUDFLARE_POLL_ATTEMPTS: ${AGENT_API_WEBFETCH_CLOUDFLARE_POLL_ATTEMPTS:-8}
      AGENT_API_WEBFETCH_CLOUDFLARE_POLL_INTERVAL: ${AGENT_API_WEBFETCH_CLOUDFLARE_POLL_INTERVAL:-1s}
      AGENT_API_WEBFETCH_CLOUDFLARE_CDP_TIMEOUT: ${AGENT_API_WEBFETCH_CLOUDFLARE_CDP_TIMEOUT:-20s}
      AGENT_API_WEBFETCH_CLOUDFLARE_CDP_POLL_INTERVAL: ${AGENT_API_WEBFETCH_CLOUDFLARE_CDP_POLL_INTERVAL:-500ms}
      AGENT_API_EMAIL_PROVIDER: ${AGENT_API_EMAIL_PROVIDER:-}
      AGENT_API_EMAIL_FROM: ${AGENT_API_EMAIL_FROM:-}
      AGENT_API_EMAIL_PUBLIC_BASE_URL: ${AGENT_API_EMAIL_PUBLIC_BASE_URL:-}
      AGENT_API_EMAIL_VERIFICATION_REQUIRED: ${AGENT_API_EMAIL_VERIFICATION_REQUIRED:-false}
      AGENT_API_EMAIL_VERIFICATION_TTL: ${AGENT_API_EMAIL_VERIFICATION_TTL:-24h}
      AGENT_API_RESEND_API_KEY: ${AGENT_API_RESEND_API_KEY:-}
      AGENT_API_RESEND_BASE_URL: ${AGENT_API_RESEND_BASE_URL:-}
      AGENT_API_ARTIFACT_STORE: ${AGENT_API_ARTIFACT_STORE:-s3}
      AGENT_API_ARTIFACT_S3_ENDPOINT: ${AGENT_API_ARTIFACT_S3_ENDPOINT:-minio:9000}
      AGENT_API_ARTIFACT_S3_ACCESS_KEY: ${AGENT_API_ARTIFACT_S3_ACCESS_KEY:-minioadmin}
      AGENT_API_ARTIFACT_S3_SECRET_KEY: ${AGENT_API_ARTIFACT_S3_SECRET_KEY:-minioadmin}
      AGENT_API_ARTIFACT_S3_BUCKET: ${AGENT_API_ARTIFACT_S3_BUCKET:-agentapi}
      AGENT_API_ARTIFACT_S3_PREFIX: ${AGENT_API_ARTIFACT_S3_PREFIX:-local}
      AGENT_API_ARTIFACT_S3_SSL: ${AGENT_API_ARTIFACT_S3_SSL:-false}
      AGENT_API_MESSAGE_SEARCH_BACKEND: ${AGENT_API_MESSAGE_SEARCH_BACKEND:-sql}
      AGENT_API_MESSAGE_SEARCH_ENDPOINT: ${AGENT_API_MESSAGE_SEARCH_ENDPOINT:-http://elasticsearch:9200}
      AGENT_API_MESSAGE_SEARCH_INDEX: ${AGENT_API_MESSAGE_SEARCH_INDEX:-agent_messages}
      AGENT_API_MESSAGE_SEARCH_API_KEY: ${AGENT_API_MESSAGE_SEARCH_API_KEY:-}
      AGENT_API_MESSAGE_SEARCH_USERNAME: ${AGENT_API_MESSAGE_SEARCH_USERNAME:-}
      AGENT_API_MESSAGE_SEARCH_PASSWORD: ${AGENT_API_MESSAGE_SEARCH_PASSWORD:-}
      AGENT_API_MESSAGE_SEARCH_INDEX_MANAGEMENT_ENABLED: ${AGENT_API_MESSAGE_SEARCH_INDEX_MANAGEMENT_ENABLED:-false}
      AGENT_API_MESSAGE_SEARCH_INDEX_LIFECYCLE_POLICY: ${AGENT_API_MESSAGE_SEARCH_INDEX_LIFECYCLE_POLICY:-}
