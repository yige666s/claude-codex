      VERTEX_BASE_URL: ${VERTEX_BASE_URL:-}
      VERTEX_IMAGE_MODEL: ${VERTEX_IMAGE_MODEL:-}
      VERTEX_IMAGE_ASPECT_RATIO: ${VERTEX_IMAGE_ASPECT_RATIO:-}
