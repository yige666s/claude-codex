    stop_grace_period: ${AGENT_API_STOP_GRACE_PERIOD:-35s}
    volumes:
      - agentapi_data:/var/lib/agentapi
      - ../../.claude:/workspace/.claude:ro
      - ${AGENT_API_SECRETS_DIR:-../../secrets}:/run/agentapi/secrets:ro
    # Optional string settings are passed through environment above. Do not add
    # empty string command args here: Go's flag parser treats them as positional
    # args and stops parsing later flags such as -skill-dirs.
    command:
      - -addr
      - :8081
      - -store-backend
      - sql
      - -sql-driver
      - pgx
      - -sql-dialect
      - postgres
      - -sql-max-open-conns
      - "${AGENT_API_SQL_MAX_OPEN_CONNS:-20}"
      - -sql-max-idle-conns
      - "${AGENT_API_SQL_MAX_IDLE_CONNS:-10}"
      - -data-dir
      - /var/lib/agentapi
      - -workspace
      - /workspace
      - -user-workspace-root
      - /var/lib/agentapi/workspaces
      - -enable-user-system
      - -auth-mode
      - jwt
      - -jwt-secret
      - "${AGENT_API_JWT_SECRET:-local-dev-jwt-secret-change-me}"
      - -artifact-store
      - "${AGENT_API_ARTIFACT_STORE:-s3}"
      - -rate-limit-backend
      - "${AGENT_API_RATE_LIMIT_BACKEND:-redis}"
      - -redis-url
      - redis://redis:6379/0?prefix=agentapi
      - -message-context-cache-backend
      - "${AGENT_API_MESSAGE_CONTEXT_CACHE_BACKEND:-redis}"
      - -message-context-cache-redis-url
      - "${AGENT_API_MESSAGE_CONTEXT_CACHE_REDIS_URL:-redis://redis:6379/1?prefix=agentapi:message:ctx}"
      - -message-context-cache-ttl
      - "${AGENT_API_MESSAGE_CONTEXT_CACHE_TTL:-24h}"
      - -session-list-cache-backend
      - "${AGENT_API_SESSION_LIST_CACHE_BACKEND:-redis}"
      - -session-list-cache-redis-url
      - "${AGENT_API_SESSION_LIST_CACHE_REDIS_URL:-redis://redis:6379/1?prefix=agentapi:session:list}"
      - -session-list-cache-ttl
      - "${AGENT_API_SESSION_LIST_CACHE_TTL:-10m}"
      - -message-sequence-backend
      - "${AGENT_API_MESSAGE_SEQUENCE_BACKEND:-redis}"
      - -message-sequence-redis-url
      - "${AGENT_API_MESSAGE_SEQUENCE_REDIS_URL:-redis://redis:6379/1?prefix=agentapi:message:seq}"
      - "-message-attachment-worker-enabled=${AGENT_API_MESSAGE_ATTACHMENT_WORKER_ENABLED:-true}"
      - -message-attachment-worker-batch-size
      - "${AGENT_API_MESSAGE_ATTACHMENT_WORKER_BATCH_SIZE:-25}"
      - -message-attachment-worker-poll-interval
      - "${AGENT_API_MESSAGE_ATTACHMENT_WORKER_POLL_INTERVAL:-5s}"
      - -message-attachment-worker-process-timeout
      - "${AGENT_API_MESSAGE_ATTACHMENT_WORKER_PROCESS_TIMEOUT:-30s}"
      - -message-attachment-thumbnail-max-dimension
      - "${AGENT_API_MESSAGE_ATTACHMENT_THUMBNAIL_MAX_DIMENSION:-512}"
      - "-message-archive-worker-enabled=${AGENT_API_MESSAGE_ARCHIVE_WORKER_ENABLED:-false}"
      - -message-archive-after
      - "${AGENT_API_MESSAGE_ARCHIVE_AFTER:-720h}"
      - -message-archive-worker-batch-size
      - "${AGENT_API_MESSAGE_ARCHIVE_WORKER_BATCH_SIZE:-100}"
      - -message-archive-worker-poll-interval
      - "${AGENT_API_MESSAGE_ARCHIVE_WORKER_POLL_INTERVAL:-1h}"
      - -message-archive-worker-process-timeout
