      AGENT_API_MESSAGE_SEARCH_INDEX_DOWNGRADE_AFTER: ${AGENT_API_MESSAGE_SEARCH_INDEX_DOWNGRADE_AFTER:-2160h}
      AGENT_API_MESSAGE_SEARCH_INDEX_CLOSE_AFTER: ${AGENT_API_MESSAGE_SEARCH_INDEX_CLOSE_AFTER:-4320h}
      AGENT_API_MESSAGE_SEARCH_INDEX_MAINTENANCE_INTERVAL: ${AGENT_API_MESSAGE_SEARCH_INDEX_MAINTENANCE_INTERVAL:-24h}
