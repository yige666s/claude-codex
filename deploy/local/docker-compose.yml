      AGENT_API_MESSAGE_EVENTS_KAFKA_BROKERS: ${AGENT_API_MESSAGE_EVENTS_KAFKA_BROKERS:-redpanda:9092}
      AGENT_API_MESSAGE_EVENTS_KAFKA_TOPIC: ${AGENT_API_MESSAGE_EVENTS_KAFKA_TOPIC:-agent.messages}
      AGENT_API_MESSAGE_EVENTS_KAFKA_CLIENT_ID: ${AGENT_API_MESSAGE_EVENTS_KAFKA_CLIENT_ID:-agentapi}
      AGENT_API_MESSAGE_EVENTS_KAFKA_CONSUMER_ENABLED: ${AGENT_API_MESSAGE_EVENTS_KAFKA_CONSUMER_ENABLED:-false}
      AGENT_API_MESSAGE_EVENTS_KAFKA_CONSUMER_GROUP: ${AGENT_API_MESSAGE_EVENTS_KAFKA_CONSUMER_GROUP:-agentapi-message-workers}
