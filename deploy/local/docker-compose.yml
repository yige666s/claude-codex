      AGENT_API_MESSAGE_CONTEXT_CACHE_REDIS_URL: ${AGENT_API_MESSAGE_CONTEXT_CACHE_REDIS_URL:-redis://redis:6379/1?prefix=agentapi:message:ctx}
      AGENT_API_MESSAGE_CONTEXT_CACHE_TTL: ${AGENT_API_MESSAGE_CONTEXT_CACHE_TTL:-24h}
      AGENT_API_SESSION_LIST_CACHE_BACKEND: ${AGENT_API_SESSION_LIST_CACHE_BACKEND:-redis}
      AGENT_API_SESSION_LIST_CACHE_REDIS_URL: ${AGENT_API_SESSION_LIST_CACHE_REDIS_URL:-redis://redis:6379/1?prefix=agentapi:session:list}
      AGENT_API_SESSION_LIST_CACHE_TTL: ${AGENT_API_SESSION_LIST_CACHE_TTL:-10m}
      AGENT_API_MESSAGE_SEQUENCE_BACKEND: ${AGENT_API_MESSAGE_SEQUENCE_BACKEND:-redis}
      AGENT_API_MESSAGE_SEQUENCE_REDIS_URL: ${AGENT_API_MESSAGE_SEQUENCE_REDIS_URL:-redis://redis:6379/1?prefix=agentapi:message:seq}
      AGENT_API_MESSAGE_ATTACHMENT_WORKER_ENABLED: ${AGENT_API_MESSAGE_ATTACHMENT_WORKER_ENABLED:-true}
      AGENT_API_MESSAGE_ATTACHMENT_WORKER_BATCH_SIZE: ${AGENT_API_MESSAGE_ATTACHMENT_WORKER_BATCH_SIZE:-25}
      AGENT_API_MESSAGE_ATTACHMENT_WORKER_POLL_INTERVAL: ${AGENT_API_MESSAGE_ATTACHMENT_WORKER_POLL_INTERVAL:-5s}
      AGENT_API_MESSAGE_ATTACHMENT_WORKER_PROCESS_TIMEOUT: ${AGENT_API_MESSAGE_ATTACHMENT_WORKER_PROCESS_TIMEOUT:-30s}
      AGENT_API_MESSAGE_ATTACHMENT_THUMBNAIL_MAX_DIMENSION: ${AGENT_API_MESSAGE_ATTACHMENT_THUMBNAIL_MAX_DIMENSION:-512}
      AGENT_API_MESSAGE_ARCHIVE_WORKER_ENABLED: ${AGENT_API_MESSAGE_ARCHIVE_WORKER_ENABLED:-false}
      AGENT_API_MESSAGE_ARCHIVE_AFTER: ${AGENT_API_MESSAGE_ARCHIVE_AFTER:-720h}
      AGENT_API_MESSAGE_ARCHIVE_WORKER_BATCH_SIZE: ${AGENT_API_MESSAGE_ARCHIVE_WORKER_BATCH_SIZE:-100}
      AGENT_API_MESSAGE_ARCHIVE_WORKER_POLL_INTERVAL: ${AGENT_API_MESSAGE_ARCHIVE_WORKER_POLL_INTERVAL:-1h}
      AGENT_API_MESSAGE_ARCHIVE_WORKER_PROCESS_TIMEOUT: ${AGENT_API_MESSAGE_ARCHIVE_WORKER_PROCESS_TIMEOUT:-2m}
      AGENT_API_MESSAGE_ARCHIVE_PREFIX: ${AGENT_API_MESSAGE_ARCHIVE_PREFIX:-message-archive}
      AGENT_API_MESSAGE_ARCHIVE_CLEAR_PG_PAYLOAD: ${AGENT_API_MESSAGE_ARCHIVE_CLEAR_PG_PAYLOAD:-true}
