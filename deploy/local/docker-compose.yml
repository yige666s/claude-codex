      AGENT_API_MESSAGE_EVENTS_PROCESSED_LOCK_BACKEND: ${AGENT_API_MESSAGE_EVENTS_PROCESSED_LOCK_BACKEND:-redis}
      AGENT_API_MESSAGE_EVENTS_PROCESSED_LOCK_REDIS_URL: ${AGENT_API_MESSAGE_EVENTS_PROCESSED_LOCK_REDIS_URL:-redis://redis:6379/1?prefix=agentapi:message:processed}
      AGENT_API_MESSAGE_EVENTS_PROCESSED_LOCK_TTL: ${AGENT_API_MESSAGE_EVENTS_PROCESSED_LOCK_TTL:-24h}
      AGENT_API_OPERATION_RATE_LIMITS: ${AGENT_API_OPERATION_RATE_LIMITS:-auth_login=20/m,auth_register=10/h,chat_message=60/m,job_create=20/m,attachment_upload=30/m,asset_download=120/m,memory_extract=30/h,data_export=5/h,account_delete=3/h,admin_action=120/m}
      AGENT_API_CORS_ALLOWED_ORIGINS: ${AGENT_API_CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:5173}
