      AGENT_API_LIVE_MODEL: ${AGENT_API_LIVE_MODEL:-gemini-live-2.5-flash-preview-native-audio-09-2025}
      AGENT_API_LIVE_VERTEX_PROJECT_ID: ${AGENT_API_LIVE_VERTEX_PROJECT_ID:-}
      AGENT_API_LIVE_VERTEX_LOCATION: ${AGENT_API_LIVE_VERTEX_LOCATION:-us-central1}
      AGENT_API_LIVE_VERTEX_BASE_URL: ${AGENT_API_LIVE_VERTEX_BASE_URL:-}
